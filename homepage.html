<div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: var(--surface-0);">
  <div style="width: 100%; max-width: 600px; text-align: center;">
    
    <!-- Greeting and time -->
    <div style="margin-bottom: 3rem;">
      <p style="font-size: 14px; color: var(--text-secondary); margin: 0 0 0.5rem 0;" id="greeting">Good morning</p>
      <p style="font-size: 48px; font-weight: 500; color: var(--text-primary); margin: 0;" id="time">9:30</p>
    </div>

    <!-- Search box -->
    <div style="margin-bottom: 3rem; display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px;">
      <i class="ti ti-search" style="color: var(--text-secondary); font-size: 18px;" aria-hidden="true"></i>
      <input type="text" placeholder="Search the web..." style="flex: 1; border: none; background: transparent; color: var(--text-primary); font-size: 16px; outline: none;" id="search" />
    </div>

    <!-- Quick links section -->
    <div style="text-align: left; margin-bottom: 2rem;">
      <p style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 1rem 0;">Quick access</p>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
        <a href="https://github.com" style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); text-decoration: none; color: var(--text-primary); transition: background 0.15s; background: var(--surface-2);" onmouseover="this.style.background='var(--surface-1)'" onmouseout="this.style.background='var(--surface-2)'">
          <i class="ti ti-brand-github" style="font-size: 18px;" aria-hidden="true"></i>
          <span style="font-size: 14px; font-weight: 500;">GitHub</span>
        </a>
        <a href="https://mail.google.com" style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); text-decoration: none; color: var(--text-primary); transition: background 0.15s; background: var(--surface-2);" onmouseover="this.style.background='var(--surface-1)'" onmouseout="this.style.background='var(--surface-2)'">
          <i class="ti ti-mail" style="font-size: 18px;" aria-hidden="true"></i>
          <span style="font-size: 14px; font-weight: 500;">Gmail</span>
        </a>
        <a href="https://youtube.com" style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); text-decoration: none; color: var(--text-primary); transition: background 0.15s; background: var(--surface-2);" onmouseover="this.style.background='var(--surface-1)'" onmouseout="this.style.background='var(--surface-2)'">
          <i class="ti ti-brand-youtube" style="font-size: 18px;" aria-hidden="true"></i>
          <span style="font-size: 14px; font-weight: 500;">YouTube</span>
        </a>
        <a href="https://reddit.com" style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); text-decoration: none; color: var(--text-primary); transition: background 0.15s; background: var(--surface-2);" onmouseover="this.style.background='var(--surface-1)'" onmouseout="this.style.background='var(--surface-2)'">
          <i class="ti ti-brand-reddit" style="font-size: 18px;" aria-hidden="true"></i>
          <span style="font-size: 14px; font-weight: 500;">Reddit</span>
        </a>
      </div>
    </div>

    <!-- Footer stats -->
    <div style="display: flex; justify-content: space-around; gap: 1rem; padding-top: 2rem; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text-secondary);">
      <div style="text-align: center;">
        <p style="margin: 0;" id="date">Monday, July 21</p>
      </div>
      <div style="text-align: center;">
        <p style="margin: 0;" id="day-name">Week 30</p>
      </div>
    </div>
  </div>
</div>

<script>
// Update time and greeting
function updateTime() {
  const now = new Date();
  const hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time').textContent = `${hours}:${minutes}`;
  
  // Update greeting based on time
  let greeting = 'Good morning';
  if (hours >= 12 && hours < 17) greeting = 'Good afternoon';
  if (hours >= 17) greeting = 'Good evening';
  if (hours < 5) greeting = 'Late night';
  document.getElementById('greeting').textContent = greeting;
  
  // Update date
  const options = { weekday: 'long', month: 'short', day: 'numeric' };
  document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
  
  // Update week number
  const firstDayOfYear = new Date(now.getFullYear(), 0, 1);
  const pastDaysOfYear = (now - firstDayOfYear) / 86400000;
  const week = Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
  document.getElementById('day-name').textContent = `Week ${week}`;
}

// Handle search
document.getElementById('search').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const query = this.value;
    if (query) {
      window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }
  }
});

updateTime();
setInterval(updateTime, 1000);
</script>
