<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #14171c;
            --surface: #1c2028;
            --surface-hover: #232833;
            --line: #2b303a;
            --text: #eae7e1;
            --text-dim: #868c98;
            --cyan: #4dd9c9;
            --magenta: #ef5f8a;
        }

        * { box-sizing: border-box; }

        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(77, 217, 201, 0.06), transparent 60%),
                radial-gradient(ellipse 900px 500px at 85% 0%, rgba(239, 95, 138, 0.06), transparent 60%);
            color: var(--text);
            margin: 0;
            padding: 64px 24px 96px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* film grain overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.05;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        header {
            max-width: 900px;
            width: 100%;
            margin-bottom: 48px;
        }

        .eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .eyebrow::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--magenta);
            box-shadow: 0 0 0 3px rgba(239, 95, 138, 0.15);
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 2.9rem);
            margin: 0 0 12px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        header p {
            color: var(--text-dim);
            font-size: 0.98rem;
            max-width: 46ch;
            line-height: 1.5;
            margin: 0;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        li { position: relative; }

        .frame-no {
            position: absolute;
            top: 14px;
            left: 18px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            z-index: 2;
            pointer-events: none;
        }

        a {
            display: flex;
            align-items: flex-end;
            min-height: 140px;
            background-color: var(--surface);
            color: var(--text);
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 600;
            padding: 20px 22px;
            border-radius: 10px;
            border: 1px solid var(--line);
            transition: transform 0.25s ease, border-color 0.25s ease, background-color 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        /* sprocket ticks along the top edge, film-strip nod */
        a::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-image: repeating-linear-gradient(
                to right,
                var(--line) 0 3px,
                transparent 3px 14px
            );
            opacity: 0.9;
        }

        a .label {
            position: relative;
            z-index: 2;
        }

        /* chromatic aberration split, the signature hover moment */
        a .label::before,
        a .label::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        a .label::before {
            color: var(--cyan);
            transform: translate(0, 0);
        }

        a .label::after {
            color: var(--magenta);
            transform: translate(0, 0);
        }

        a:hover {
            transform: translateY(-4px);
            border-color: rgba(77, 217, 201, 0.3);
            background-color: var(--surface-hover);
        }

        a:hover .label::before {
            opacity: 0.7;
            transform: translate(-2px, -1.5px);
        }

        a:hover .label::after {
            opacity: 0.7;
            transform: translate(2px, 1.5px);
        }

        a:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 3px;
        }

        .empty-state, .error-state {
            grid-column: 1 / -1;
            border: 1px dashed var(--line);
            border-radius: 10px;
            padding: 36px 24px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .error-state { color: var(--magenta); border-color: rgba(239, 95, 138, 0.3); }

        @media (prefers-reduced-motion: reduce) {
            a, a .label::before, a .label::after { transition: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="eyebrow">Project index</div>
        <h1>My Projects</h1>
        <p>A running index of things I'm building, testing, and taking apart.</p>
    </header>

    <ul id="project-list">
        <!-- Linki załadują się tutaj z pliku JSON -->
    </ul>

    <script>
        const list = document.getElementById('project-list');

        fetch('pages.json')
            .then(response => response.json())
            .then(data => {
                if (!Array.isArray(data) || data.length === 0) {
                    const li = document.createElement('li');
                    li.className = 'empty-state';
                    li.textContent = 'No projects loaded yet — add entries to pages.json to see them here.';
                    list.appendChild(li);
                    return;
                }

                data.forEach((page, index) => {
                    const li = document.createElement('li');

                    const frameNo = document.createElement('span');
                    frameNo.className = 'frame-no';
                    frameNo.textContent = String(index + 1).padStart(2, '0');
                    li.appendChild(frameNo);

                    const a = document.createElement('a');
                    a.href = page.url;

                    const label = document.createElement('span');
                    label.className = 'label';
                    label.textContent = page.name;
                    label.setAttribute('data-text', page.name);

                    a.appendChild(label);
                    li.appendChild(a);
                    list.appendChild(li);
                });
            })
            .catch(error => {
                console.error('Błąd ładowania pliku pages.json:', error);
                const li = document.createElement('li');
                li.className = 'error-state';
                li.textContent = "Couldn't load pages.json — check that the file exists and is valid JSON.";
                list.appendChild(li);
            });
    </script>

</body>
</html>
